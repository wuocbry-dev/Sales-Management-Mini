# MySQL chạy sẵn trên máy (Docker khác) — host/port/user/pass khớp application.properties.
# Chỉ build & chạy backend + frontend; kết nối DB qua mạng tới MYSQL_HOST (mặc định 127.0.0.1:3306).
#
# Chạy: docker compose up --build
# Web: http://localhost:8088  (API: http://localhost:8088/api/...)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sales_management_mini}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-12345}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8088:80"
    depends_on:
      - backend
