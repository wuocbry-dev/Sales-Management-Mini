# Test không cần MySQL — dùng H2 trong bộ nhớ
spring.datasource.url=jdbc:h2:mem:quanlybanhang_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.jwt.secret=test-jwt-secret-at-least-32-characters-long-ok
app.jwt.expiration-ms=3600000
