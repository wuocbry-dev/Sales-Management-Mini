# Chạy local: --spring.profiles.active=dev
# Thông tin DB đặt trong application-local.properties (ở thư mục backend/, không commit — xem .gitignore).
spring.config.import=optional:file:./application-local.properties

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none

# Flyway: bật khi đã thêm dependency org.flywaydb:flyway-core
spring.flyway.enabled=false

# PostgreSQL ví dụ URL: jdbc:postgresql://127.0.0.1:5432/quanlybanhang

# CORS: Postman không kiểm tra CORS; trình duyệt thì có. Nếu frontend vẫn 403 dù Postman OK, thử:
# app.cors.allow-all-http-origins=true
# (chỉ dev; mở mọi origin http — không dùng production)
