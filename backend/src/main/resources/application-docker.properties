# Profile: docker
# Kích hoạt: SPRING_PROFILES_ACTIVE=docker (docker-compose mặc định đã bật).
# CORS rộng cho HTTP — chỉ dùng khi chạy stack Docker nội bộ; production nên thu hẹp origin.
app.cors.allow-all-http-origins=true

# Database configuration cho Docker - kết nối từ docker-compose
# Mặc định từ docker-compose-local.yml: host.docker.internal:3306 / sales_management_mini / root:12345
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:host.docker.internal}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:sales_management_mini}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&useUnicode=true&characterEncoding=utf8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# Application config
app.auth.register-default-role=${REGISTER_DEFAULT_ROLE:STORE_MANAGER}
app.upload.product-images-dir=${PRODUCT_IMAGES_DIR:uploads/products}
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:3MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:12MB}
