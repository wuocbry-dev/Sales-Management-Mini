{%- if cookiecutter.enable_kubernetes %}
# Secret for {{ cookiecutter.project_name }}
# WARNING: Replace placeholder values before deploying!
# Consider using external secrets management (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: {{ cookiecutter.project_slug }}-secrets
  namespace: {{ cookiecutter.project_slug }}
  labels:
    app.kubernetes.io/name: {{ cookiecutter.project_slug }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # Auth (always enabled) — generate with: openssl rand -hex 32
  SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  API_KEY: "CHANGE_ME_IN_PRODUCTION"

{%- if cookiecutter.use_postgresql %}
  # PostgreSQL
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
{%- endif %}

{%- if cookiecutter.enable_redis %}
  # Redis
  REDIS_PASSWORD: ""
{%- endif %}

{%- if cookiecutter.enable_logfire %}
  LOGFIRE_TOKEN: ""
{%- endif %}

{%- if cookiecutter.enable_sentry %}
  SENTRY_DSN: ""
{%- endif %}

  # LLM API Keys
{%- if cookiecutter.use_openai %}
  OPENAI_API_KEY: ""
{%- endif %}
{%- if cookiecutter.use_anthropic %}
  ANTHROPIC_API_KEY: ""
{%- endif %}
{%- if cookiecutter.use_google %}
  GOOGLE_API_KEY: ""
{%- endif %}
{%- if cookiecutter.use_openrouter %}
  OPENROUTER_API_KEY: ""
{%- endif %}

{%- if cookiecutter.enable_oauth_google %}
  # OAuth
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
{%- endif %}

{%- if cookiecutter.enable_langsmith %}
  # LangSmith
  LANGCHAIN_API_KEY: ""
{%- endif %}
{%- else %}
# Kubernetes is disabled for this project
{%- endif %}
