name: Bug Report
description: Report a bug or unexpected behaviour in full-stack-ai-agent-template
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Please fill out this form **in English** so maintainers and the community can help effectively.
        For **security vulnerabilities**, do NOT use this form — email **security@vstorm.co** instead (see [SECURITY.md](https://github.com/vstorm-co/full-stack-ai-agent-template/blob/main/SECURITY.md)).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I run `fastapi-fullstack create` with X options, it generates Y instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the problem.
      placeholder: |
        1. Install fastapi-fullstack==X.Y.Z
        2. Run: `fastapi-fullstack create my_app --preset ai-agent`
        3. Run: `make docker-up`
        4. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include the full error message and traceback.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: fastapi-fullstack Version
      placeholder: "0.2.5"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the generated project is affected?
      options:
        - CLI / Project generation
        - Backend (FastAPI)
        - Frontend (Next.js)
        - AI Agent / Framework
        - Docker / Infrastructure
        - RAG / Knowledge Base
        - Other
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.12.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots that might help.
    validations:
      required: false
