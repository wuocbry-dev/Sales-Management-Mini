<!DOCTYPE html>
<html lang="vi" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng ký | RetailOps</title>
<link rel="stylesheet" href="../css/shared.css"/>
<link rel="stylesheet" href="../css/pages/register.css"/>
<script src="../js/tailwind-config-default.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-6 relative">
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-teal-50 rounded-full blur-3xl opacity-60"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-teal-100/40 rounded-full blur-3xl opacity-60"></div>
</div>
<div class="w-full max-w-md bg-white rounded-xl shadow-xl shadow-slate-200/50 border border-slate-200 z-10 overflow-hidden">
<div class="p-8 md:p-10">
<div class="text-center mb-6">
<div class="inline-flex items-center justify-center w-12 h-12 bg-teal-700 text-white rounded-lg mb-4">
<span class="material-symbols-outlined text-3xl">person_add</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 tracking-tight">Tạo tài khoản</h1>
<p class="text-slate-500 text-sm mt-1">POST <code class="text-xs bg-slate-100 px-1 rounded">/api/auth/register</code></p>
</div>
<div id="register-error" class="hidden mb-6 flex items-center gap-3 p-3 bg-red-50 border border-red-100 rounded-lg text-red-700 text-sm" role="alert">
<span class="material-symbols-outlined text-lg flex-shrink-0">error</span>
<span id="register-error-msg"></span>
</div>
<form id="register-form" class="space-y-4" method="post" action="#" autocomplete="on" novalidate>
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1" for="reg-username">Tên đăng nhập</label>
<input class="block w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500/20 focus:border-teal-700 text-sm outline-none" id="reg-username" name="username" maxlength="50" required autocomplete="username"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1" for="reg-email">Email</label>
<input class="block w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500/20 focus:border-teal-700 text-sm outline-none" id="reg-email" name="email" type="email" maxlength="100" required autocomplete="email"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1" for="reg-fullname">Họ và tên</label>
<input class="block w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500/20 focus:border-teal-700 text-sm outline-none" id="reg-fullname" name="fullName" maxlength="150" required autocomplete="name"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1" for="reg-phone">Số điện thoại <span class="text-slate-400 font-normal">(tuỳ chọn)</span></label>
<input class="block w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500/20 focus:border-teal-700 text-sm outline-none" id="reg-phone" name="phone" maxlength="20" autocomplete="tel"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1" for="password">Mật khẩu (≥ 6 ký tự)</label>
<div class="relative">
<input class="block w-full pl-3 pr-10 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500/20 focus:border-teal-700 text-sm outline-none" id="password" name="password" type="password" minlength="6" maxlength="100" required autocomplete="new-password"/>
<button id="toggle-password" type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600" aria-label="Hiện/ẩn mật khẩu">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button id="register-submit" type="submit" class="w-full py-3 px-4 bg-teal-700 hover:bg-teal-800 text-white text-sm font-bold rounded-lg shadow-sm transition-all">Đăng ký</button>
</form>
<p class="text-center text-sm text-slate-600 mt-6">Đã có tài khoản? <a class="font-medium text-teal-700 hover:text-teal-800" href="login.html">Đăng nhập</a></p>
</div>
</div>
</main>
<footer class="w-full px-8 py-4 border-t border-slate-200/50 text-center text-xs text-slate-500">RetailOps — bổ sung ngoài bộ 14 màn Stitch</footer>
<script src="../js/register.js"></script>
</body>
</html>
