<!DOCTYPE html>
<html lang="vi" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập | RetailOps</title>
<link rel="stylesheet" href="../css/shared.css"/>
<link rel="stylesheet" href="../css/pages/login.css"/>
<script src="../js/tailwind-config-default.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-6 relative">
<!-- Decorative background elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-teal-50 rounded-full blur-3xl opacity-60"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-teal-100/40 rounded-full blur-3xl opacity-60"></div>
</div>
<!-- Login Card -->
<div class="w-full max-w-md bg-white rounded-xl shadow-xl shadow-slate-200/50 border border-slate-200 z-10 overflow-hidden">
<div class="p-8 md:p-10">
<!-- Header / Logo -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-12 h-12 bg-teal-700 text-white rounded-lg mb-4">
<span class="material-symbols-outlined text-3xl" data-icon="storefront">storefront</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 tracking-tight">RetailOps</h1>
<p class="text-slate-500 text-sm mt-1">Hệ thống quản lý bán hàng đa cửa hàng</p>
</div>
<!-- Thông báo sau đăng ký -->
<div id="login-info" class="hidden mb-6 flex items-center gap-3 p-3 bg-teal-50 border border-teal-100 rounded-lg text-teal-800 text-sm" role="status">
<span class="material-symbols-outlined text-lg flex-shrink-0">check_circle</span>
<span>Đăng ký thành công. Vui lòng đăng nhập.</span>
</div>
<!-- Lỗi từ API (ẩn khi chưa có lỗi) -->
<div id="login-error" class="hidden mb-6 flex items-center gap-3 p-3 bg-red-50 border border-red-100 rounded-lg text-red-700 text-sm" role="alert">
<span class="material-symbols-outlined text-lg flex-shrink-0" data-icon="error">error</span>
<span id="login-error-msg"></span>
</div>
<!-- Form: POST /api/auth/login — JSON { username, password } -->
<form id="login-form" class="space-y-5" method="post" action="#" autocomplete="on" novalidate>
<!-- Username/Email Field — backend: LoginRequest.username -->
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1.5" for="username">Email hoặc tên đăng nhập</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</span>
<input class="block w-full pl-10 pr-3 py-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500/20 focus:border-teal-700 text-slate-900 text-sm placeholder:text-slate-400 transition-all outline-none" id="username" name="username" placeholder="Ví dụ: admin@retailops.vn" type="text" autocomplete="username" required/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-1.5">
<label class="block text-sm font-semibold text-slate-700" for="password">Mật khẩu</label>
<a class="text-xs font-medium text-teal-700 hover:text-teal-800 transition-colors" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</span>
<input class="block w-full pl-10 pr-10 py-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500/20 focus:border-teal-700 text-slate-900 text-sm placeholder:text-slate-400 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password" autocomplete="current-password" required/>
<button id="toggle-password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 transition-colors" type="button" aria-label="Hiện hoặc ẩn mật khẩu">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-teal-700 focus:ring-teal-600 border-slate-300 rounded cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 cursor-pointer select-none" for="remember-me">Ghi nhớ đăng nhập</label>
</div>
<!-- Submit Button -->
<button id="login-submit" class="w-full flex justify-center items-center py-3 px-4 bg-teal-700 hover:bg-teal-800 text-white text-sm font-bold rounded-lg shadow-sm transition-all duration-200 active:scale-[0.98]" type="submit">
            Đăng nhập
          </button>
<p class="text-center text-sm text-slate-600 mt-4">Chưa có tài khoản? <a class="font-medium text-teal-700 hover:text-teal-800" href="register.html">Đăng ký</a></p>
</form>
<!-- Alternative Auth -->
<div class="mt-8 pt-8 border-t border-slate-100 flex flex-col items-center">
<p class="text-xs text-slate-400 mb-4 uppercase tracking-widest font-semibold">Liên kết hệ thống</p>
<div class="flex gap-4">
<button class="w-10 h-10 flex items-center justify-center border border-slate-200 rounded-full hover:bg-slate-50 transition-colors text-slate-600">
<span class="material-symbols-outlined" data-icon="qr_code_2">qr_code_2</span>
</button>
<button class="w-10 h-10 flex items-center justify-center border border-slate-200 rounded-full hover:bg-slate-50 transition-colors text-slate-600">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- Footer (Inspired by JSON "Footer" component but adapted for login context) -->
<footer class="w-full flex flex-col md:flex-row justify-between items-center px-8 py-6 bg-transparent border-t border-slate-200/50">
<p class="text-xs font-medium text-slate-500">© 2026 RetailOps ERP. Hệ thống hỗ trợ doanh nghiệp.</p>
<div class="flex gap-6 mt-4 md:mt-0">
<a class="text-xs font-medium text-slate-500 hover:text-teal-700 transition-colors" href="#">Điều khoản</a>
<a class="text-xs font-medium text-slate-500 hover:text-teal-700 transition-colors" href="#">Bảo mật</a>
<a class="text-xs font-medium text-slate-500 hover:text-teal-700 transition-colors" href="#">Hỗ trợ</a>
</div>
</footer>
<script src="../js/login.js"></script>
</body></html>
